<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inglés II - Plataforma CCH</title>
    <!-- Tailwind para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para leer JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #root { height: 100%; }
        /* Estilos personalizados para scrollbars */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeUnit, setActiveUnit] = useState(0);
            const [activeTopic, setActiveTopic] = useState(0);
            const [showQuiz, setShowQuiz] = useState(false);
            const [quizScore, setQuizScore] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(true);

            // Efecto para inicializar iconos de Lucide
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeUnit, activeTopic, showQuiz, sidebarOpen]);

            const units = [
                {
                    id: 1,
                    title: "Unit 1: What do we do in our free time?",
                    icon: "calendar",
                    topics: [
                        { 
                            title: "Routine verbs and present simple", 
                            content: "Talk about your daily life. Expressions: on Mondays, at 6pm, in the morning.",
                            interactive: "Activity: Match 'Have breakfast' and 'Study' with their images.",
                            didYouKnow: "In English-speaking countries, breakfast is often the most important meal!",
                            audioFile: "audio_u1_t1.mp3",
                            videoFile: "video_u1_t1.mp4"
                        },
                        { 
                            title: "Adverbs of frequency", 
                            content: "Always, often, sometimes, never. How often do you study?",
                            interactive: "Listen to the audio and identify frequency adverbs.",
                            didYouKnow: "Adverbs of frequency go BEFORE the main verb but AFTER the verb 'to be'.",
                            audioFile: "audio_u1_t2.mp3",
                            videoFile: "video_u1_t2.mp4"
                        }
                    ],
                    quiz: [
                        { q: "I ___ (watch) TV on Mondays.", a: ["watch", "watches", "watching"], correct: 0 },
                        { q: "She ___ (have) breakfast at 7 am.", a: ["have", "has", "haved"], correct: 1 }
                    ]
                },
                {
                    id: 2,
                    title: "Unit 2: What is happening?",
                    icon: "cloud-sun",
                    topics: [
                        { 
                            title: "Present continuous", 
                            content: "Actions happening right now. Subject + am/is/are + verb-ing.",
                            interactive: "Describe what people are doing in the park picture.",
                            didYouKnow: "In the UK, talking about the weather is a national hobby!",
                            audioFile: "audio_u2_t1.mp3",
                            videoFile: "video_u2_t1.mp4"
                        }
                    ],
                    quiz: [
                        { q: "They ___ (play) football now.", a: ["is playing", "are playing", "play"], correct: 1 }
                    ]
                }
            ];

            const currentUnit = units[activeUnit];
            const currentTopic = currentUnit.topics[activeTopic];

            const handleNext = () => {
                if (activeTopic < currentUnit.topics.length - 1) {
                    setActiveTopic(activeTopic + 1);
                } else {
                    setShowQuiz(true);
                }
            };

            return (
                <div className="flex h-screen bg-slate-50 text-slate-900">
                    {/* Sidebar */}
                    <aside className={`${sidebarOpen ? 'w-80' : 'w-20'} bg-indigo-900 text-white transition-all duration-300 flex flex-col shadow-xl`}>
                        <div className="p-6 flex items-center gap-3 border-b border-indigo-800">
                            <i data-lucide="book-open" className="text-indigo-400"></i>
                            {sidebarOpen && <h1 className="font-bold text-xl truncate">INGLÉS II</h1>}
                        </div>
                        
                        <nav className="flex-1 overflow-y-auto py-4 custom-scroll">
                            {units.map((unit, index) => (
                                <button
                                    key={unit.id}
                                    onClick={() => {
                                        setActiveUnit(index);
                                        setActiveTopic(0);
                                        setShowQuiz(false);
                                        setQuizScore(null);
                                    }}
                                    className={`w-full flex items-center gap-4 px-6 py-4 transition-colors ${activeUnit === index ? 'bg-indigo-700 border-r-4 border-white' : 'hover:bg-indigo-800'}`}
                                >
                                    <i data-lucide={unit.icon}></i>
                                    {sidebarOpen && <span className="text-sm font-medium text-left truncate">{unit.title}</span>}
                                </button>
                            ))}
                        </nav>

                        <button 
                            onClick={() => setSidebarOpen(!sidebarOpen)}
                            className="p-4 bg-indigo-950 hover:bg-indigo-800 flex justify-center"
                        >
                            <i data-lucide="menu"></i>
                        </button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <header className="bg-white border-b p-4 shadow-sm flex items-center">
                            <h2 className="font-semibold text-indigo-900 truncate">{currentUnit.title}</h2>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 sm:p-8 custom-scroll">
                            <div className="max-w-4xl mx-auto w-full">
                                {!showQuiz ? (
                                    <div className="space-y-8 animate-in fade-in duration-500">
                                        <section className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                            <h3 className="text-2xl font-bold text-slate-800 mb-4">{currentTopic.title}</h3>
                                            <p className="text-slate-600 text-lg leading-relaxed mb-6">{currentTopic.content}</p>
                                            
                                            <div className="bg-indigo-50 rounded-xl p-4 border border-indigo-100">
                                                <div className="flex items-center gap-2 text-indigo-900 font-bold mb-3">
                                                    <i data-lucide="headphones" className="w-5 h-5"></i>
                                                    <span>Audio Lesson</span>
                                                </div>
                                                <audio controls className="w-full" key={currentTopic.audioFile}>
                                                    <source src={currentTopic.audioFile} type="audio/mpeg" />
                                                </audio>
                                            </div>
                                        </section>

                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div className="bg-black rounded-2xl overflow-hidden shadow-lg aspect-video flex items-center justify-center">
                                                <video controls className="w-full h-full" key={currentTopic.videoFile}>
                                                    <source src={currentTopic.videoFile} type="video/mp4" />
                                                </video>
                                            </div>

                                            <div className="bg-white rounded-2xl p-6 border border-slate-200 flex flex-col items-center justify-center text-center">
                                                <i data-lucide="brain" className="text-purple-500 w-8 h-8 mb-2"></i>
                                                <h4 className="font-bold text-slate-800 uppercase text-xs tracking-widest mb-2">Unit Concept</h4>
                                                <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-2xl font-black text-indigo-600">
                                                    {currentUnit.id}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-amber-50 rounded-2xl p-6 border border-amber-100 flex gap-4">
                                            <i data-lucide="help-circle" className="text-amber-500 flex-shrink-0"></i>
                                            <div>
                                                <h4 className="font-bold text-amber-900">Did You Know?</h4>
                                                <p className="text-amber-800 italic">{currentTopic.didYouKnow}</p>
                                            </div>
                                        </div>

                                        <div className="flex justify-between items-center pt-6">
                                            <button 
                                                disabled={activeTopic === 0}
                                                onClick={() => setActiveTopic(activeTopic - 1)}
                                                className="flex items-center gap-2 text-slate-400 disabled:opacity-0 font-bold"
                                            >
                                                <i data-lucide="chevron-left"></i> Previous
                                            </button>
                                            <button 
                                                onClick={handleNext}
                                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg"
                                            >
                                                Next Topic <i data-lucide="chevron-right"></i>
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-3xl shadow-xl p-8 text-center max-w-lg mx-auto border border-slate-100">
                                        <i data-lucide="award" className="w-16 h-16 text-indigo-600 mx-auto mb-4"></i>
                                        <h3 className="text-2xl font-bold mb-2">Unit Review</h3>
                                        <p className="text-slate-500 mb-8">Test your knowledge for {currentUnit.title}</p>
                                        <div className="text-5xl font-black text-indigo-600 mb-8">100%</div>
                                        <button 
                                            onClick={() => {
                                                if (activeUnit < units.length - 1) {
                                                    setActiveUnit(activeUnit + 1);
                                                    setActiveTopic(0);
                                                    setShowQuiz(false);
                                                }
                                            }}
                                            className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-colors"
                                        >
                                            Continue to Next Unit
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
